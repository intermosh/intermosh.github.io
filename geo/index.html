<!DOCTYPE html>
<!-- <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1c2407b26c61958baa93967b5412487cd94b290b/dist/aframe-master.min.js"></script> -->
<!-- <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script> -->
<script src="aframe-master.min.js"></script>
<script src="aframe-ar.min.js"></script>

<body style='margin : 0px; overflow: hidden;'>
    <a-scene embedded markerdebug arjs='sourceType: webcam; debugUIEnabled: false;'>
        <a-camera gps-camera rotation-reader/> 
    </a-scene>
</body>
 <script>
    window.onload = () => {
        let scene = document.querySelector('a-scene');

        let box = document.createElement('a-box');
                box.setAttribute('gps-entity-place', `latitude: -31.736021; longitude: -60.536669`);
                box.setAttribute('scale', '2 2 2');
                box.setAttribute('color', 'red')
                scene.appendChild(box);
    };
</script> 
</html>
