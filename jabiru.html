<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: assets/jabiru.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <!-- Modelo 3D -->
        <a-asset-item id="jabiru-model" src="assets/jabiru.glb"></a-asset-item>

        <!-- Sonido -->
        <audio id="jabiru-sound" src="assets/jabiru.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Modelo 3D -->
        <a-entity
          gltf-model="#jabiru-model"
          scale="0.5 0.5 0.5"
          position="0 0 -5"
          animation-mixer="clip: run; loop: once"
        ></a-entity>

        <!-- Reproductor de sonido -->
        <a-sound
          id="sound-player"
          src="#jabiru-sound"
          autoplay="false"
          loop="false"
        ></a-sound>
      </a-entity>
    </a-scene>

    <script>
      // Esperar a que el archivo de sonido termine de cargarse
      document.querySelector('a-scene').addEventListener('loaded', () => {
        const soundPlayer = document.querySelector('#sound-player');
        const audioElement = document.querySelector('#jabiru-sound');

        // Escuchar el evento 'canplaythrough' para asegurar que el sonido está listo
        audioElement.addEventListener('canplaythrough', () => {
          console.log('Sound is ready to play.');
          soundPlayer.components.sound.playSound();
        });
      });
    </script>
  </body>
</html>
