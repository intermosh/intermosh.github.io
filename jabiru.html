<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: assets/jabiru.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
      <a-assets>
        <a-asset-item id="jabiru-model" src="assets/jabiru.glb"></a-asset-item>
        <audio id="jabiru-sound" src="assets/jabiru.mp3" loop="true"></audio>
      </a-assets>

    <a-entity id="jabiru-sound" geometry="primitive: plane" position="0 0 0"
      sound="src: url(assets/jabiru.mp3); autoplay: true"></a-entity>
    
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>




      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity
          gltf-model="#jabiru-model"
          scale="0.05 0.05 0.05"
          position="0 0 0"
          rotation="45 0 0" 
          animation-mixer="clip: run; loop: once"
        ></a-entity>

      </a-entity>

    </a-scene>


  </body>
</html>
