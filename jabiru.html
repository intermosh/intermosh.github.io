<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: assets/jabiru.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true">
      <a-assets>
        <!-- Modelo 3D -->
        <a-asset-item id="jabiru-model" src="assets/jabiru.glb"></a-asset-item>

        <!-- Sonido -->
        <audio id="jabiru-sound" src="assets/jabiru.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Modelo 3D con rotación -->
        <a-entity
          gltf-model="#jabiru-model"
          scale="0.05 0.05 0.05"
          position="0 0 0"
          rotation="45 0 0"
          animation-mixer="clip: run; loop: once"
        ></a-entity>

        <!-- Reproductor de sonido -->
        <a-sound
          id="sound-player"
          src="#jabiru-sound"
          autoplay="false"
          loop="true"
        ></a-sound>
      </a-entity>
    </a-scene>

    <script>
      // Referencias a elementos
      const soundPlayer = document.querySelector('#sound-player');
      const audioElement = document.querySelector('#jabiru-sound');

      // Evento para reproducir el sonido cuando se detecta el marcador
      document.querySelector('a-scene').addEventListener('loaded', () => {
        const targetEntity = document.querySelector('[mindar-image-target]');

        // Cuando se detecta el marcador
        targetEntity.addEventListener('targetFound', () => {
          console.log('Marcador detectado. Reproduciendo sonido...');
          if (audioElement.readyState >= 3) {
            soundPlayer.components.sound.playSound(); // Reproducir el sonido
          } else {
            console.warn('El archivo de sonido aún no está listo.');
          }
        });

        // Cuando el marcador deja de ser visible
        targetEntity.addEventListener('targetLost', () => {
          console.log('Marcador perdido. Deteniendo sonido...');
          soundPlayer.components.sound.stopSound(); // Detener el sonido
        });
      });
    </script>
  </body>
</html>
