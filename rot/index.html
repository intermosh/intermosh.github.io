<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Rot Beneath — Archivo Curado</title>
<style>
  :root{
    --bg:#0c0c0c;
    --bg-panel:#141414;
    --line:#3a3a3a;
    --line-strong:#e8e8e8;
    --ink:#ededed;
    --ink-dim:#9a9a9a;
    --ink-faint:#6b6b6b;
    --white:#f2f2f2;
    --black:#000000;
    --red:#a8384a;
    --red-dim:#7a2a37;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Century Gothic','Futura','Avenir Next','Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  ::selection{background:var(--red);color:var(--white);}
  a{color:var(--ink);}

  /* ============ HEADER ============ */
  header.masthead{
    border-bottom:3px solid var(--line-strong);
    padding: calc(8px*5) calc(8px*4) calc(8px*4);
    text-align:center;
  }
  .wordmark{
    font-size: 2.8rem;
    letter-spacing: 0.06em;
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:14px;
  }
  .wordmark .rot{color:var(--red);}
  .masthead-sub{
    font-size:0.78rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom: 28px;
  }
  .masthead-meta{
    display:flex; justify-content:center; gap:40px; flex-wrap:wrap;
    font-size:0.72rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.1em;
    border-top:1px solid var(--line); padding-top:18px; max-width:900px; margin:0 auto;
  }
  .masthead-meta b{color:var(--red); font-weight:700;}

  /* ============ STATS STRIP ============ */
  .stats{
    display:grid;
    grid-template-columns: repeat(10, 1fr);
    border-bottom:3px solid var(--line-strong);
  }
  .stat{
    padding: 20px 10px;
    border-right:1px solid var(--line);
    text-align:center;
    cursor:pointer;
    transition: background .15s ease;
  }
  .stat:last-child{border-right:none;}
  .stat:hover{background:var(--bg-panel);}
  .stat.active{background:var(--red);}
  .stat.active .stat-num, .stat.active .stat-label{color:var(--white);}
  .stat-num{
    font-size:1.7rem; font-weight:700; display:block; line-height:1; color:var(--ink);
  }
  .stat-label{
    font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--ink-dim); margin-top:6px; display:block;
  }

  /* ============ CONTROLS ============ */
  #controls{max-width:1300px;margin:0 auto;padding: 26px 24px;}
  #search{
    width:100%;padding:14px 16px;background:var(--bg-panel);
    border:1px solid var(--line);color:#fff;
    font-family:inherit;font-size:0.9rem;outline:none;transition:border .2s;
  }
  #search:focus{border-color:var(--red);}
  .filters{display:flex;gap:32px;margin-top:20px;flex-wrap:wrap;}
  .fg{flex:1;min-width:260px;}
  .fl{display:block;color:var(--ink-faint);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:10px;}
  .bw{display:flex;flex-wrap:wrap;gap:1px; background:var(--line);}
  .btn{
    background:var(--bg);border:none;color:var(--ink-dim);
    padding:9px 16px;font-family:inherit;font-size:0.7rem;text-transform:uppercase;
    cursor:pointer;transition:all .15s;letter-spacing:0.08em;
  }
  .btn:hover{color:var(--ink);}
  .btn.on{background:var(--red);color:#fff;}

  /* ============ GRID ============ */
  #grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:1px;background:var(--line);
    max-width:1300px;margin:0 auto;padding:0 24px 40px;
  }
  .card{
    background:var(--bg);border:none;padding:0 20px 20px;transition:background .2s;position:relative;
    display:flex;flex-direction:column;
  }
  .card-img{
    width:100%;height:180px;object-fit:cover;display:block;margin-bottom:14px;
    filter:brightness(0.92) saturate(0.85);
    transition:filter .2s;
  }
  .card:hover .card-img{filter:brightness(1) saturate(1);}
  .card:hover{background:var(--bg-panel);}
  .card::before{
    content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--red);
    transition:width .3s ease;
  }
  .card:hover::before{width:100%;}
  .ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px;}
  .ct{font-size:0.92rem;color:#fff;text-transform:uppercase;letter-spacing:0.03em;line-height:1.3;font-weight:700;}
  .tag{
    background:transparent;border:1px solid var(--red);color:var(--red);
    padding:3px 8px;font-size:0.58rem;font-weight:700;text-transform:uppercase;
    letter-spacing:0.08em;white-space:nowrap;flex:none;
  }
  .meta{display:flex;gap:10px;font-size:0.72rem;color:var(--ink-faint);margin-bottom:10px;flex-wrap:wrap;}
  .meta .rg{color:var(--red);font-weight:700;}
  .desc{font-size:0.82rem;color:var(--ink-dim);line-height:1.55;margin-bottom:12px;}
  .links{padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:5px;}
  .links-label{font-size:0.6rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
  .links a{color:var(--ink-dim);font-size:0.74rem;text-decoration:none;transition:color .15s;word-break:break-word;line-height:1.4;}
  .links a:hover{color:var(--red);text-decoration:underline;}
  .no-link{color:var(--ink-faint);font-size:0.72rem;font-style:italic;}

  .empty-state{
    grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--ink-faint);
    border:1px dashed var(--line);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.1em;
  }

  /* ============ METHOD PLACEHOLDER ============ */
  main.after{max-width:1300px;margin:0 auto;padding:20px 24px 80px;}
  .section-label{display:flex;align-items:center;gap:16px;margin: 50px 0 24px;}
  .section-label .num{
    font-size:0.75rem;border:1.5px solid var(--red);color:var(--red);width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;flex:none;
  }
  .section-label h2{font-size:1rem;text-transform:uppercase;letter-spacing:0.14em;margin:0;font-weight:700;}
  .section-label .rule{flex:1;height:1px;background:var(--line);}
  .method-placeholder{
    border:1.5px dashed var(--line);padding:40px 30px;color:var(--ink-faint);
    font-size:0.85rem;line-height:1.7;
  }
  .method-placeholder b{color:var(--ink);}
  .method-placeholder .tag-todo{
    display:inline-block;border:1px solid var(--red);color:var(--red);
    font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;padding:3px 8px;margin-bottom:14px;
  }

  footer{
    border-top:3px solid var(--line-strong);padding:26px 24px;text-align:center;
    font-size:0.68rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.1em;
  }

  @media(max-width:900px){.stats{grid-template-columns:repeat(5,1fr);}}
  @media(max-width:640px){
    .filters{flex-direction:column;}
    .wordmark{font-size:1.8rem;}
    #grid{grid-template-columns:1fr;}
    .stats{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="wordmark"><span class="rot">THE ROT</span> BENEATH</div>
  <div class="masthead-sub">Archive of Transgressive & Depraved Interactive Works</div>
  <div class="masthead-meta">
    <!-- <div>Todos los enlaces a Wikipedia eliminados</div> -->
  </div>
</header>

<div class="stats" id="statsRow"></div>

<div id="controls">
  <input type="text" id="search" placeholder="Buscar títulos, creadores, descripciones...">
  <div class="filters">
    <div class="fg"><label class="fl">Región</label><div id="rf" class="bw"></div></div>
    <div class="fg"><label class="fl">Categoría</label><div id="cf" class="bw"></div></div>
  </div>
</div>

<main id="grid"></main>

const R = ["ALL","US","EU","JP","RU","OTHER"];
const C = ["ALL","HATE","ATROCITY","SNUFF","TORTURE","RPG","BODY","NSFW","PSYCH","RETAIL","META"];
let aR="ALL", aC="ALL", q="";

const g=document.getElementById("grid"), rf=document.getElementById("rf"), cf=document.getElementById("cf"), s=document.getElementById("search");

function mkB(arr,cont,cb){
  arr.forEach(v=>{
    const b=document.createElement("button");
    b.className="btn"+(v==="ALL"?" on":"");
    b.textContent=v;
    b.onclick=()=>{
      cont.querySelectorAll(".btn").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      cb(v);
    };
    cont.appendChild(b);
  });
}
mkB(R,rf,v=>{aR=v;render();});
mkB(C,cf,v=>{aC=v;render();});
s.oninput=e=>{q=e.target.value.toLowerCase();render();};

function renderStats(){
  const cats = C.filter(c=>c!=="ALL");
  const counts = cats.map(c=>({key:c, num: D.filter(d=>d.c===c).length}));
  const row = document.getElementById('statsRow');
  const allCount = D.length;
  const items = [{key:'ALL', label:'TOTAL', num:allCount}].concat(
    counts.map(c=>({key:c.key, label:c.key, num:c.num}))
  );
  row.innerHTML = items.map(it => `
    <div class="stat" data-key="${it.key}">
      <span class="stat-num">${it.num}</span>
      <span class="stat-label">${it.label}</span>
    </div>`).join('');
  row.querySelectorAll('.stat').forEach(el=>{
    el.addEventListener('click', ()=>{
      const k = el.getAttribute('data-key');
      aC = k;
      cf.querySelectorAll('.btn').forEach(b=>b.classList.toggle('on', b.textContent===k));
      render();
    });
  });
}

function render(){
  g.innerHTML="";
  document.querySelectorAll('.stat').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-key')===aC);
  });
  const filtered = D.filter(i=>
    (aR==="ALL"||i.r===aR) &&
    (aC==="ALL"||i.c===aC) &&
    (!q || i.t.toLowerCase().includes(q) || i.d.toLowerCase().includes(q) || i.x.toLowerCase().includes(q))
  );
  if(filtered.length===0){
    g.innerHTML = '<div class="empty-state">Ningún caso coincide con este filtro</div>';
    return;
  }
  filtered.forEach(i=>{
    const c=document.createElement("div");
    c.className="card";
    let lh='<div class="links"><span class="links-label">ENLACES</span>';
    if(i.l && i.l.length>0){
      i.l.forEach(lk=>{
        lh += `<a href="${lk.u}" target="_blank" rel="noopener noreferrer">${lk.n}</a>`;
      });
    } else {
      lh += '<span class="no-link">No se encontró enlace público verificable</span>';
    }
    lh += '</div>';
    const slug = i.t.replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_').toLowerCase().slice(0,60);
    const imgHtml = `<img class="card-img" src="image/${slug}.jpg" alt="${i.t}" loading="lazy" onerror="this.style.display='none'">`;
    c.innerHTML = `${imgHtml}<div class="ch"><h2 class="ct">${i.t}</h2><span class="tag">${i.c}</span></div><div class="meta">${i.y||'?'} · ${i.d} · <span class="rg">${i.r}</span></div><p class="desc">${i.x}</p>${lh}`;
    g.appendChild(c);
  });
}

renderStats();
render();
</script>
