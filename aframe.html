<!DOCTYPE html>
<html>
<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<!-- <script src="/1.0.4/aframe.min.js"></script>
<script src="aframe-ar.js"></script> -->
<!-- <script src="aframe-particle-system-component.min.js"></script> -->

<body style="margin : 0px; overflow: hidden;">
  <!-- ='sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960;'  -->
  <a-scene embedded arjs  
  vr-mode-ui="enabled: false"> <!-- stats -->

    <!-- Preload assets -->
    <a-assets>
      <a-asset-item id="jellyf" src="jellyf.gltf"></a-asset-item>
    </a-assets>

    <!-- Lights -->
    <a-entity light="type: ambient; color: #fff"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.8" 
              position="-0.5 1 1"></a-entity>

    <!-- Marker -->
    <a-marker  type="pattern" url="pattern-jellyf.patt">

    <!-- Sound -->
    <!-- <a-entity id="river" geometry="primitive: plane" material="color: blue"
    position="-10 0 0" sound="src: url(test.mp3); autoplay: true"></a-entity> -->

    <!-- Particles -->
    <!-- <a-entity position="0 0 0" particle-system="preset: snow; particleCount: 1000; color:#d9d9d9"></a-entity> -->

    <!-- 3D Model -->
      <a-entity 
        position="0 2 0" 
        scale="1 1 1"
        animation="property: rotation; to: 0 0 360; dur: 38000; easing: linear; loop: true"
    

        gltf-model="#jellyf"
        ></a-entity>

    </a-marker>
    <!-- animation__2="property: object3D.position.z; to: 2.2; dir: alternate; dur: 10000; loop: true;" -->
    <a-entity camera></a-entity>

  </a-scene>
</body>

</html>
