<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ScriptLab v4 — Test Harness Hito 3</title>
<style>
  :root{--bg:#0d1117;--panel:#161b27;--border:#26304a;--text:#e6ebf5;--muted:#8b97ad;--good:#5cdb87;--bad:#ff6879;--warn:#f4b857;--purple:#7969ff;--teal:#32d2ac}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,system-ui,sans-serif;padding:24px;min-height:100vh}
  h1{font-size:20px;margin-bottom:4px}
  .sub{color:var(--muted);margin-bottom:16px;font-size:13px}
  .summary{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:120px}
  .card b{font-size:24px;display:block;line-height:1}
  .card small{color:var(--muted);font-size:11px}
  .card.pass b{color:var(--good)}.card.fail b{color:var(--bad)}
  pre.out{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;overflow:auto;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;max-height:50vh}
  .tline{padding:2px 0}.tline.pass{color:var(--good)}.tline.fail{color:var(--bad)}.tline.info{color:var(--muted)}
  .tline.head{color:var(--purple);font-weight:600;margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
  .tline.head:first-child{border-top:0;margin-top:0;padding-top:0}
  .warn-banner{background:rgba(255,104,121,.12);border:1px solid rgba(255,104,121,.4);border-radius:8px;padding:14px 18px;margin-bottom:18px;font-size:13px}
  .warn-banner b{color:var(--bad)}.warn-banner code{background:#070a10;padding:2px 6px;border-radius:4px;font:12px ui-monospace,monospace}
  .app-frame{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;height:600px}
  .app-frame iframe{width:100%;height:100%;border:0;background:var(--bg)}
</style></head>
<body>
<h1>ScriptLab v4 — Hito 3 · Test Harness</h1>
<p class="sub">Smoke de UI e integración. La app real corre en el iframe de abajo. Requiere <code>http://localhost</code>.</p>
<div id="file-warning" class="warn-banner" hidden></div>
<div class="summary">
  <div class="card pass"><b id="pass-c">—</b><small>Pasaron</small></div>
  <div class="card fail"><b id="fail-c">—</b><small>Fallaron</small></div>
</div>
<pre class="out" id="out"></pre>

<div class="app-frame">
  <iframe id="app-frame" src="./index.html"></iframe>
</div>

<script type="module">
const out = document.getElementById('out');
const warn = document.getElementById('file-warning');
let pass = 0, fail = 0;
const lines = [];

function head(t) { lines.push({cls:'head', t:'\n=== ' + t + ' ==='}); }
function ok(c, l) { if(c){pass++;lines.push({cls:'pass',t:'  ✓ '+l})}else{fail++;lines.push({cls:'fail',t:'  ✗ '+l})} }
function info(t) { lines.push({cls:'info', t:'  ' + t}); }
function render() {
  out.innerHTML = lines.map(l => '<div class="tline ' + l.cls + '">' + l.t.replace(/</g,'&lt;') + '</div>').join('\n');
  document.getElementById('pass-c').textContent = pass;
  document.getElementById('fail-c').textContent = fail;
}

if (location.protocol === 'file:') {
  warn.hidden = false;
  warn.innerHTML = '<b>⚠ file:// no funciona.</b> Serví vía localhost: <code>python -m http.server 8000</code> y abrí <code>http://localhost:8000/tests-harness-h3.html</code>.';
} else {

// Esperar a que la app cargue y boot() complete en el iframe.
// boot() es async (IDB, workers) → poll por window.ScriptLab hasta 5s.
// También detectamos el banner de error rojo que boot().catch() inserta.
const frame = document.getElementById('app-frame');
frame.addEventListener('load', async () => {
  let waited = 0;
  const step = 100;
  while (waited < 5000) {
    const w = frame.contentWindow;
    // ¿Boot ya completó?
    if (w && w.ScriptLab) { runTests(); return; }
    // ¿Boot crasheó? (banner rojo insertado por boot().catch)
    const banner = frame.contentDocument?.querySelector('div[style*="ff6879"]');
    if (banner) {
      fail++;
      lines.push({cls:'fail', t:'  ✗ boot() crasheó: ' + banner.textContent.trim()});
      lines.push({cls:'info', t:'  Revisá la consola del iframe (click derecho → Inspect).'});
      render();
      return;
    }
    await new Promise(r => setTimeout(r, step));
    waited += step;
  }
  // Timeout: boot no completó ni crasheó en 5s
  head('Boot');
  fail++;
  lines.push({cls:'fail', t:'  ✗ boot() no completó en 5 segundos. Revisá consola del iframe.'});
  render();
});

async function runTests() {
  try {
    const app = frame.contentWindow;
    // ES modules no exponen bindings en window. La app expone un hook de debug
    // `window.ScriptLab` desde main.js. Si no existe aún, boot() no terminó.
    const SL = app.ScriptLab;
    const doc = frame.contentDocument;

    head('Estructura DOM del wireframe v4 (T-12)');
    ok(!!doc.querySelector('header.h'), 'Header slim presente');
    ok(doc.querySelectorAll('.seg .view').length === 3, 'Control segmentado Canvas/Timeline/Tele');
    ok(doc.querySelectorAll('#palette button').length === 7, 'Paleta con 7 tipos de bloque');
    ok(!!doc.querySelector('#title') && !!doc.querySelector('#promise'), 'Meta bar: Título + Promesa');
    ok(!!doc.querySelector('#wpm') && !!doc.querySelector('#target-duration'), 'Meta bar: WPM + Duración');
    ok(!!doc.querySelector('.reader'), 'Reader (panel métricas) presente');
    ok(doc.querySelectorAll('.ring-card').length === 2, 'Dos anillos hero (Salud + Retención)');
    ok(!!doc.querySelector('#ring-health') && !!doc.querySelector('#ring-retention'), 'SVG anillos con IDs');
    ok(!!doc.querySelector('#run-deep'), 'Botón "Analizar a fondo" presente');
    ok(!!doc.querySelector('#deep-section.pending'), 'Sección tier 2 grisada inicialmente');
    ok(!!doc.querySelector('#aidialog'), 'Diálogo Configurar IA presente');
    ok(!!doc.querySelector('#export-menu'), 'Menú de export presente');

    head('Boot + estado inicial (T-17)');
    ok(app.ScriptLabBooted === true || doc.documentElement.dataset.scriptlabReady === 'true', 'boot() completó');
    ok(!!SL?.state?.p, 'state.p cargado (proyecto activo)');
    ok(SL.state.p.title === 'Nuevo guion' || SL.state.p.blocks.length >= 0, 'Proyecto inicial válido');
    ok(doc.querySelector('#mini-health') !== null, 'Eco mini de anillos en header');

    head('Cómputo tier 1 tiempo real (T-15/T-16)');
    // El anillo salud debe mostrar un número (no "—") tras boot
    const healthNum = doc.querySelector('#health-num');
    ok(healthNum && healthNum.textContent !== '—', 'Anillo Salud muestra número: ' + (healthNum?.textContent || '—'));

    head('Incrementalidad (§14.4) — escribir no re-renderiza toda la lista');
    // Usar el hook ScriptLab en vez de bindings directos (ES modules no exponen en window)
    const proj = SL.state.p;
    proj.blocks = [];
    SL.state.flowDirty = true;
    SL.render();
    await new Promise(r => setTimeout(r, 100));

    // Añadir bloques via addBlock
    SL.addBlock('HOOK');
    await new Promise(r => setTimeout(r, 50));
    SL.addBlock('CONTEXTO');
    await new Promise(r => setTimeout(r, 50));
    SL.addBlock('CTA');
    await new Promise(r => setTimeout(r, 100));

    const blocks = doc.querySelectorAll('.flow-block');
    ok(blocks.length === 3, '3 bloques renderizados tras addBlock');
    if (blocks.length === 3) {
      const firstBlockId = blocks[0].dataset.id;
      const firstTextarea = blocks[0].querySelector('.inline-block-editor');
      // Editar el del medio
      const middleTextarea = blocks[1].querySelector('.inline-block-editor');
      middleTextarea.value = 'Escribiendo contenido de prueba para verificar incrementalidad del render.';
      middleTextarea.oninput({ target: middleTextarea });
      await new Promise(r => setTimeout(r, 100));
      // El primer bloque debe seguir siendo el mismo nodo
      const firstBlockAfter = doc.querySelector('.flow-block[data-id="' + firstBlockId + '"]');
      ok(!!firstBlockAfter && firstBlockAfter.dataset.id === firstBlockId, 'Primer bloque NO se re-renderizó (mismo data-id)');
    }

    head('Tier 2 on-demand (T-17)');
    ok(typeof SL?.runDeep === 'function', 'runDeep disponible (botón Analizar a fondo)');
    // No ejecutamos runDeep porque requiere modelos; verificamos que el botón existe y la sección se limpia

    head('Modo enfoque (T-13/T-16)');
    const reader = doc.querySelector('#reader');
    const toggleRight = doc.querySelector('#toggle-right');
    if (toggleRight) {
      toggleRight.click();
      ok(reader.classList.contains('collapsed'), 'Click toggle-right colapsa el reader');
      toggleRight.click();
      ok(!reader.classList.contains('collapsed'), 'Click de nuevo restaura el reader');
    } else {
      ok(false, 'toggle-right no encontrado');
    }

    head('Theme toggle (T-13)');
    const themeBtn = doc.querySelector('#theme');
    if (themeBtn) {
      const wasLight = doc.body.classList.contains('light');
      themeBtn.click();
      ok(doc.body.classList.contains('light') !== wasLight, 'Theme toggle cambia .light en body');
      themeBtn.click(); // restaurar
    }

    head('Resumen');
    info('Pasaron: ' + pass + ' · Fallaron: ' + fail);
    info('La app real está corriendo en el iframe de arriba ↑ (podés interactuar)');

  } catch (e) {
    fail++;
    lines.push({cls:'fail', t:'\nEXCEPCIÓN: ' + e.message + '\n' + e.stack});
  } finally {
    render();
  }
}

} // fin else
</script>
</body></html>
