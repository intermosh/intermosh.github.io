<!DOCTYPE html>
<html>
      <!-- HACK-FIX TO ZOOMED CAMERA ISSUE -->
      <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

      <head>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<!-- <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script> -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script> 
<!-- <script src="/1.0.4/aframe.min.js"></script> -->


<!-- <script src="aframe-ar.js"></script> -->



</head>
<body style="margin : 0px; overflow: hidden;">

  <a-scene embedded arjs

  vr-mode-ui="enabled: false"> <!-- stats -->

    <!-- Preload assets -->
    <a-assets>
      <a-asset-item id="animal" src="/Carpincho.glb"></a-asset-item>
    </a-assets>

    <!-- Lights -->
    <a-entity light="type: ambient; color: #fff"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.8"
              position="-0.5 1 1"></a-entity>

    <!-- Marker -->
    <a-marker  type="pattern" url="pattern-jellyf.patt">

    <!-- Sound -->
    <!-- <a-entity id="river" geometry="primitive: plane" material="color: blue"
    position="-10 0 0" sound="src: url(test.mp3); autoplay: true"></a-entity> -->

    <!-- 3D Model -->
    <a-entity
    position="0 0 0"
    scale="2 2 2"
    animation="property: rotation; to: 0 0 0; dur: 800; easing: linear; loop: true"

    gltf-model="#animal"
    ></a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>

</html>
